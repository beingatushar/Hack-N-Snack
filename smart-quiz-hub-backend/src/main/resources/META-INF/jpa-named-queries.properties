# =============================================================
# Externalized JPQL named queries (Spring Data JPA)
# =============================================================
# Decouples JPQL from the repository Java code. Each entry is referenced from a
# repository method via @Query(name = "<key>"). Key convention: <Entity>.<method>.
#
# Native PostgreSQL queries (full-text search, date_trunc, EXTRACT EPOCH) are NOT
# JPQL and stay inline in the repositories with nativeQuery = true.
#
# NOTE: each query must be a single logical line. Use a trailing backslash to wrap.
# =============================================================

# ── McqQuestion ──────────────────────────────────────────────
McqQuestion.findApprovedByStackId=SELECT q FROM McqQuestion q WHERE q.stack.id = :stackId AND q.status = 'APPROVED'

McqQuestion.countByReviewerIdAndStatus=SELECT COUNT(q) FROM McqQuestion q WHERE q.reviewer.id = :reviewerId AND q.status = :status

McqQuestion.findForExport=SELECT q FROM McqQuestion q WHERE q.status = :status \
  AND (:stackId IS NULL OR q.stack.id = :stackId) \
  AND (:topicId IS NULL OR q.topic.id = :topicId) \
  AND (:difficulty IS NULL OR q.difficulty = :difficulty)

McqQuestion.countByStack=SELECT q.stack.stackName, COUNT(q) FROM McqQuestion q GROUP BY q.stack.stackName

McqQuestion.countByDifficulty=SELECT q.difficulty, COUNT(q) FROM McqQuestion q GROUP BY q.difficulty

McqQuestion.reviewerWorkload=SELECT q.reviewer.fullName, COUNT(q) FROM McqQuestion q \
  WHERE q.status = 'UNDER_REVIEW' AND q.reviewer IS NOT NULL GROUP BY q.reviewer.fullName

McqQuestion.findUnassignedReadyForReview=SELECT q FROM McqQuestion q WHERE q.status = 'READY_FOR_REVIEW' AND q.reviewer IS NULL

# Date-range analytics (Epic 2)
McqQuestion.countByStatusInRange=SELECT q.status, COUNT(q) FROM McqQuestion q \
  WHERE q.createdAt >= :start AND q.createdAt < :end GROUP BY q.status

McqQuestion.countByStackInRange=SELECT q.stack.stackName, COUNT(q) FROM McqQuestion q \
  WHERE q.createdAt >= :start AND q.createdAt < :end GROUP BY q.stack.stackName

McqQuestion.countByDifficultyInRange=SELECT q.difficulty, COUNT(q) FROM McqQuestion q \
  WHERE q.createdAt >= :start AND q.createdAt < :end GROUP BY q.difficulty

McqQuestion.avgSimilarityInRange=SELECT AVG(q.aiSimilarityScore) FROM McqQuestion q \
  WHERE q.aiSimilarityScore IS NOT NULL AND q.createdAt >= :start AND q.createdAt < :end

McqQuestion.authoredCountsByCreator=SELECT q.creator.id, COUNT(q) FROM McqQuestion q \
  WHERE q.createdAt >= :start AND q.createdAt < :end GROUP BY q.creator.id

McqQuestion.reviewDecisionCountsByReviewer=SELECT q.reviewer.id, q.status, COUNT(q) FROM McqQuestion q \
  WHERE q.reviewer IS NOT NULL AND q.reviewedAt IS NOT NULL \
  AND q.reviewedAt >= :start AND q.reviewedAt < :end \
  GROUP BY q.reviewer.id, q.status

McqQuestion.pendingCountsByReviewer=SELECT q.reviewer.id, COUNT(q) FROM McqQuestion q \
  WHERE q.status = 'UNDER_REVIEW' AND q.reviewer IS NOT NULL GROUP BY q.reviewer.id

# ── User ─────────────────────────────────────────────────────
User.findSmesByStackId=SELECT u FROM User u JOIN u.stackMappings sm \
  WHERE sm.stack.id = :stackId AND u.active = true AND u.role = 'SME'

# ── Notification ─────────────────────────────────────────────
Notification.markRead=UPDATE Notification n SET n.read = true WHERE n.id = :id AND n.user.id = :userId

Notification.markAllRead=UPDATE Notification n SET n.read = true WHERE n.user.id = :userId AND n.read = false
