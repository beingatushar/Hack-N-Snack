server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: never
    include-stacktrace: never

spring:
  application:
    name: smart-quiz-ai-hub
  # SECURITY: Set DB_USERNAME and DB_PASSWORD env vars in production. Never use default 'root'.
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smart_quiz_hub}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:dummy-key-replace-in-prod}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
          max-tokens: 1000

# SECURITY: Override JWT_SECRET env var with a cryptographically random 256-bit key in production.
# Never use the default value outside of local development.
jwt:
  secret: ${JWT_SECRET:${JWT_SECRET}}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

app:
  cors:
    allowed-origins: http://localhost:4200

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.accenture.smartquiz: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/smart-quiz-hub.log
